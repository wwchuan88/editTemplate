<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Test</title>
    <script src="js/tailwindcss.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#F5F5F5',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center">
    <div class="bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold text-center mb-4">Tailwind CSS Test</h1>
        <p class="text-gray-600 mb-4">If Tailwind is working, this text should be gray.</p>
        <div class="w-20 h-20 bg-surface rounded-full mx-auto mb-4"></div>
        <p class="text-center font-medium">This box should have the surface color (#F5F5F5).</p>
    </div>
</body>
</html>
